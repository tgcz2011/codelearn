# ============================================================
# Fly.io 部署配置：CodeLearn Go 代码执行服务
# 文档：https://fly.io/docs/reference/configuration/
# ============================================================
# 使用前：
#   1. 安装 flyctl：https://fly.io/docs/flyctl/install/
#   2. flyctl login
#   3. flyctl deploy            （首次会自动创建 app）
# 若 app 名 codelearn-go-runner 已被占用，请改成你自己的唯一名字。
# ============================================================

app = "codelearn-go-runner"
# 部署区域：nrt=东京，离国内较近；可改为 hkg(香港)/sin(新加坡)/sea(西雅图) 等
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # 节省免费额度：无流量时自动停机，有请求时自动唤醒
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[vm]
  # 编译 Go 代码较吃内存；256MB 免费层默认可能对复杂代码 OOM，可按需调到 512MB。
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# 可选环境变量（按需取消注释）
# [env]
#   MAX_CONCURRENT = "10"
#   ALLOWED_ORIGINS = "https://your-codelearn-web.vercel.app"
#   MEM_LIMIT_MB = "512"   # 仅 Linux 生效，注意 Go 运行时虚拟内存特性（见 main/rlimit 注释）
