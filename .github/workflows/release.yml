name: Release

# SubTask 11.1: push 到 main / 打 tag (v*) / 手动触发 时构建并发布 release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# 同一分支/tag 的新构建不取消旧的（避免产物不完整）
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 计算 App 版本号：
#   main 分支 push → 0.1.RUN_NUMBER（合法 semver，minor≤255 满足 MSI 限制，
#                   Android versionCode 也在线性范围内）
#   tag push → tag 本身去掉 v 前缀（须为合法 semver 如 v1.2.3 → 1.2.3）
# 各 build job 通过 needs: version 依赖此 job，通过 outputs 获取版本号注入 tauri.conf.json / Cargo.toml
jobs:
  version:
    name: 📋 Compute Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.ver.outputs.app_version }}
      tag: ${{ steps.ver.outputs.tag }}
      name: ${{ steps.ver.outputs.name }}
    steps:
      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # v1.2.3 → 1.2.3（tag 须为合法 semver）
            APP_VERSION="${TAG#v}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date -u +%Y%m%d)
            SHA_SHORT="${GITHUB_SHA::7}"
            # 0.1.RUN_NUMBER：合法 semver，minor=1 ≤ 255（MSI 限制），
            # patch=run_number 每次 push 递增；Android versionCode 派生值远低于 2100000000
            APP_VERSION="0.1.${GITHUB_RUN_NUMBER}"
            # tag 保留日期+sha 以便追溯
            TAG="v${DATE}-${SHA_SHORT}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=Release ${DATE} (${SHA_SHORT})" >> "$GITHUB_OUTPUT"
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed app_version=${APP_VERSION}, tag=${TAG}"

  # ============================================================
  # SubTask 11.2: Web 构建（Vite build → 上传到 Release）
  # ============================================================
  web-build:
    name: 🌐 Web Build
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (tsc + Vite)
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_DATA_BACKEND: supabase

      - name: Package web/dist
        working-directory: web/dist
        run: zip -r "$GITHUB_WORKSPACE/codelearn-web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: codelearn-web.zip
          retention-days: 7

  # ============================================================
  # SubTask 11.3: macOS 构建（Tauri build → dmg）
  # ============================================================
  macos-build:
    name: 🍎 macOS Build
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject app version
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          # 更新 tauri.conf.json 版本号
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${APP_VERSION}\"/" src-tauri/tauri.conf.json
          # 更新 Cargo.toml 版本号
          sed -i '' "s/^version = \"[^\"]*\"/version = \"${APP_VERSION}\"/" src-tauri/Cargo.toml
          echo "Injected version: ${APP_VERSION}"
          grep '"version"' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (dmg)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_DATA_BACKEND: supabase

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7

  # ============================================================
  # SubTask 11.4: Windows 构建（Tauri build → msi/exe）
  # ============================================================
  windows-build:
    name: 🪟 Windows Build
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject app version
        shell: bash
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          # 更新 tauri.conf.json 版本号（Windows bash 用 sed -i 不带空串参数）
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${APP_VERSION}\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"${APP_VERSION}\"/" src-tauri/Cargo.toml
          echo "Injected version: ${APP_VERSION}"
          grep '"version"' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (msi + nsis)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_DATA_BACKEND: supabase

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ============================================================
  # SubTask 11.5: 移动端构建（可选，Android only，不签名）
  # continue-on-error: 缺少签名证书或未初始化时不会阻断流水线
  # ============================================================
  mobile-build:
    name: 📱 Mobile Build (Optional)
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject app version
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${APP_VERSION}\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"${APP_VERSION}\"/" src-tauri/Cargo.toml
          echo "Injected version: ${APP_VERSION}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" || sdkmanager "ndk;26.3.11579264" || true
          NDK_DIR=$(ls -d "${ANDROID_HOME}"/ndk/* 2>/dev/null | head -1)
          if [ -n "$NDK_DIR" ]; then
            echo "NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          fi

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Init Android project
        run: cargo tauri android init

      - name: Build Android APK (unsigned)
        run: cargo tauri android build --apk
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_DATA_BACKEND: supabase

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # SubTask 11.6: 自动创建 GitHub Release 并上传全平台产物
  # ============================================================
  deploy-pages:
    name: 🚀 Deploy to GitHub Pages
    needs: [web-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Unzip web build
        run: unzip web-dist/codelearn-web.zip -d public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: 📦 Create Release
    needs: [version, web-build, macos-build, windows-build, mobile-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.name }}
          prerelease: false
          generate_release_notes: true
          body: |
            ## Web 版在线体验
            👉 https://tgcz2011.github.io/codelearn/

            ## 下载安装
            - **macOS**: 下载 `.dmg` 文件
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包
            - **Android**: 下载 `.apk`（未签名）
            - **Web**: 下载 `codelearn-web.zip`，需通过 HTTP 服务器访问（不能直接双击打开）
          files: |
            artifacts/web-dist/**
            artifacts/macos-build/**
            artifacts/windows-build/**
            artifacts/android-build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
