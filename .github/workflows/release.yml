name: Release

# SubTask 11.1: push 到 main / 打 tag (v*) / 手动触发 时构建并发布 release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# 同一分支/tag 的新构建不取消旧的（避免产物不完整）
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # SubTask 11.2: Web 构建（Vite build → 上传到 Release）
  # ============================================================
  web-build:
    name: 🌐 Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (tsc + Vite)
        run: pnpm build

      - name: Package web/dist
        working-directory: web/dist
        run: zip -r "$GITHUB_WORKSPACE/codelearn-web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: codelearn-web.zip
          retention-days: 7

  # ============================================================
  # SubTask 11.3: macOS 构建（Tauri build → dmg）
  # ============================================================
  macos-build:
    name: 🍎 macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (dmg)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7

  # ============================================================
  # SubTask 11.4: Windows 构建（Tauri build → msi/exe）
  # ============================================================
  windows-build:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (msi + nsis)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ============================================================
  # SubTask 11.5: 移动端构建（可选，Android only，不签名）
  # continue-on-error: 缺少签名证书或未初始化时不会阻断流水线
  # ============================================================
  mobile-build:
    name: 📱 Mobile Build (Optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" || sdkmanager "ndk;26.3.11579264" || true
          NDK_DIR=$(ls -d "${ANDROID_HOME}"/ndk/* 2>/dev/null | head -1)
          if [ -n "$NDK_DIR" ]; then
            echo "NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          fi

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Init Android project
        run: cargo tauri android init

      - name: Build Android APK (unsigned)
        run: cargo tauri android build --apk

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # SubTask 11.6: 自动创建 GitHub Release 并上传全平台产物
  # ============================================================
  deploy-pages:
    name: 🚀 Deploy to GitHub Pages
    needs: [web-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Unzip web build
        run: unzip web-dist/codelearn-web.zip -d public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: 📦 Create Release
    needs: [web-build, macos-build, windows-build, mobile-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT="${GITHUB_SHA::7}"
            echo "tag=dev-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "name=Dev Build ${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Web 版在线体验
            👉 https://tgcz2011.github.io/codelearn/

            ## 下载安装
            - **macOS**: 下载 `.dmg` 文件
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包
            - **Android**: 下载 `.apk`（未签名）
            - **Web**: 下载 `codelearn-web.zip`，需通过 HTTP 服务器访问（不能直接双击打开）
          files: |
            artifacts/web-dist/**
            artifacts/macos-build/**
            artifacts/windows-build/**
            artifacts/android-build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
